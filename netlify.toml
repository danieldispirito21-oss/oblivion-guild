[build]
  publish = "."
  command = ""

# Ignorar el servidor Node.js en el deploy
[build.environment]
  NODE_VERSION = "20"

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manga/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirigir admin.html a login si no hay sesión (lo maneja el JS)
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
