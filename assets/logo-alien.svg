<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue eye gradient - electric/glowing -->
    <radialGradient id="eyeGrad" cx="40%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#C8F0FF"/>
      <stop offset="25%"  stop-color="#55CCFF"/>
      <stop offset="60%"  stop-color="#0099EE"/>
      <stop offset="100%" stop-color="#003388" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Subtle head inner fill -->
    <radialGradient id="headFill" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="rgba(240,240,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(180,180,220,0.01)"/>
    </radialGradient>

    <!-- Eye outer glow -->
    <filter id="eyeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft outer glow for head outline -->
    <filter id="headGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gold glow for ornaments -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── OUTER ORNAMENTAL RING ── -->
  <ellipse cx="100" cy="108" rx="96" ry="105"
           fill="none" stroke="rgba(201,168,76,0.18)" stroke-width="1.2"
           stroke-dasharray="6,4"/>
  <ellipse cx="100" cy="108" rx="91" ry="100"
           fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="0.6"/>

  <!-- ── CORNER ORNAMENTS (top) ── -->
  <!-- Left ornament -->
  <path d="M18,48 Q10,30 22,18 Q30,10 44,16" fill="none" stroke="rgba(201,168,76,0.55)" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M22,18 Q14,22 18,34" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="0.9"/>
  <circle cx="18" cy="48" r="1.8" fill="rgba(201,168,76,0.6)"/>
  <circle cx="44" cy="16" r="1.5" fill="rgba(201,168,76,0.5)"/>
  <!-- Right ornament (mirror) -->
  <path d="M182,48 Q190,30 178,18 Q170,10 156,16" fill="none" stroke="rgba(201,168,76,0.55)" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M178,18 Q186,22 182,34" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="0.9"/>
  <circle cx="182" cy="48" r="1.8" fill="rgba(201,168,76,0.6)"/>
  <circle cx="156" cy="16" r="1.5" fill="rgba(201,168,76,0.5)"/>

  <!-- Top center gem/dot -->
  <circle cx="100" cy="8" r="3" fill="rgba(201,168,76,0.7)" filter="url(#goldGlow)"/>
  <circle cx="100" cy="8" r="1.5" fill="#FFE070"/>

  <!-- ── ALIEN HEAD ── -->
  <!-- Main head shape: wide cranium, tapers to narrow chin -->
  <path d="M100,22
           C68,22 30,40 24,72
           C18,102 24,132 44,158
           C58,175 76,186 100,190
           C124,186 142,175 156,158
           C176,132 182,102 176,72
           C170,40 132,22 100,22 Z"
        fill="url(#headFill)"
        stroke="rgba(255,255,255,0.85)"
        stroke-width="2"
        filter="url(#headGlow)"/>

  <!-- Inner head contour (subtle depth) -->
  <path d="M100,30
           C72,30 38,46 32,74
           C26,100 32,128 50,152
           C63,168 80,178 100,182
           C120,178 137,168 150,152
           C168,128 174,100 168,74
           C162,46 128,30 100,30 Z"
        fill="none"
        stroke="rgba(255,255,255,0.08)"
        stroke-width="1"/>

  <!-- Subtle cheekbone / temple lines -->
  <path d="M32,100 Q50,118 66,114" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-linecap="round"/>
  <path d="M168,100 Q150,118 134,114" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-linecap="round"/>

  <!-- ── LEFT EYE ── -->
  <!-- Outer glow halo -->
  <ellipse cx="64" cy="100" rx="34" ry="21" fill="rgba(0,153,238,0.12)" filter="url(#eyeGlow)"/>
  <!-- Eye shape -->
  <ellipse cx="64" cy="100" rx="28" ry="17" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <!-- Eye iris / pupil -->
  <ellipse cx="64" cy="100" rx="12" ry="11" fill="rgba(0,10,35,0.9)"/>
  <!-- Iris ring -->
  <ellipse cx="64" cy="100" rx="12" ry="11" fill="none" stroke="rgba(0,160,255,0.5)" stroke-width="1"/>
  <!-- Eye highlights -->
  <ellipse cx="58" cy="95"  rx="5"  ry="3.5" fill="rgba(200,240,255,0.65)"/>
  <ellipse cx="70" cy="104" rx="2.5" ry="2"  fill="rgba(100,200,255,0.3)"/>

  <!-- ── RIGHT EYE ── -->
  <!-- Outer glow halo -->
  <ellipse cx="136" cy="100" rx="34" ry="21" fill="rgba(0,153,238,0.12)" filter="url(#eyeGlow)"/>
  <!-- Eye shape -->
  <ellipse cx="136" cy="100" rx="28" ry="17" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <!-- Eye iris / pupil -->
  <ellipse cx="136" cy="100" rx="12" ry="11" fill="rgba(0,10,35,0.9)"/>
  <!-- Iris ring -->
  <ellipse cx="136" cy="100" rx="12" ry="11" fill="none" stroke="rgba(0,160,255,0.5)" stroke-width="1"/>
  <!-- Eye highlights -->
  <ellipse cx="130" cy="95"  rx="5"  ry="3.5" fill="rgba(200,240,255,0.65)"/>
  <ellipse cx="142" cy="104" rx="2.5" ry="2"  fill="rgba(100,200,255,0.3)"/>

  <!-- ── CROWN (below face area) ── -->
  <g transform="translate(100,210)">
    <!-- Crown base -->
    <path d="M-24,0 L-24,-8 L-12,-16 L0,-8 L12,-16 L24,-8 L24,0 Z"
          fill="none" stroke="rgba(201,168,76,0.7)" stroke-width="1.4"
          stroke-linejoin="round" filter="url(#goldGlow)"/>
    <!-- Crown center jewel -->
    <circle cx="0" cy="-8" r="2.5" fill="rgba(0,153,238,0.8)" filter="url(#eyeGlow)"/>
    <circle cx="0" cy="-8" r="1.2" fill="#88DDFF"/>
    <!-- Crown side jewels -->
    <circle cx="-12" cy="-16" r="1.8" fill="rgba(201,168,76,0.8)"/>
    <circle cx="12"  cy="-16" r="1.8" fill="rgba(201,168,76,0.8)"/>
  </g>

  <!-- ── BOTTOM ORNAMENT ── -->
  <path d="M76,225 Q100,232 124,225" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1" stroke-linecap="round"/>
  <circle cx="100" cy="232" r="2" fill="rgba(201,168,76,0.45)"/>
</svg>
