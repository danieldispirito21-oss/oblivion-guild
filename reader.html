<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leer — Oblivion Manga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
  </style>
</head>
<body class="reader-body">

  <!-- TOP BAR -->
  <div class="reader-topbar">
    <a href="index.html" class="reader-back">&#8592; Volver</a>
    <span class="reader-chapter-title" id="chapterTitle">Cargando...</span>
    <select class="reader-chapter-select" id="chapterSelect">
      <!-- populated by JS -->
    </select>
  </div>

  <!-- PAGE -->
  <main class="reader-main" id="readerMain">
    <div class="reader-img-wrap" id="imgWrap">
      <img id="readerImg" class="reader-page-img zoom-fit" src="" alt="Página del manga">
    </div>
  </main>

  <!-- BOTTOM BAR -->
  <div class="reader-bottombar">
    <button class="reader-btn" id="btnPrev">&#8592; Anterior</button>

    <!-- Zoom controls -->
    <div class="reader-zoom-bar">
      <button class="reader-btn reader-zoom-btn" id="btnZoomOut" title="Alejar (Ctrl+Rueda)">−</button>
      <span class="reader-zoom-level" id="zoomDisplay" title="Doble clic en imagen para zoom rápido">100%</span>
      <button class="reader-btn reader-zoom-btn" id="btnZoomIn"  title="Acercar (Ctrl+Rueda)">+</button>
      <button class="reader-btn reader-zoom-btn" id="btnZoomFit" title="Ajustar a pantalla">⊡</button>
    </div>

    <span class="reader-counter" id="pageCounter">— / —</span>
    <button class="reader-btn" id="btnNext">Siguiente &#8594;</button>
  </div>

  <!-- THUMBNAIL STRIP -->
  <div class="reader-thumbs" id="thumbStrip"></div>

  <!-- OVERLAY: ¿Continuar donde lo dejaste? -->
  <div id="continueOverlay" style="display:none;position:fixed;inset:0;z-index:500;
       background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);
       display:none;align-items:center;justify-content:center;">
    <div style="background:#06060F;border:1px solid rgba(201,168,76,0.25);border-radius:14px;
         padding:2.5rem;text-align:center;max-width:380px;width:90%;">
      <div style="font-size:2rem;margin-bottom:1rem;">📖</div>
      <div style="font-family:'Cinzel',serif;font-size:1rem;color:#EDE8E0;margin-bottom:0.5rem;">
        ¿Continuar leyendo?
      </div>
      <div style="font-size:0.82rem;color:#C9A84C;margin-bottom:1.5rem;" id="continueMsg">
        Cargando...
      </div>
      <div style="display:flex;gap:0.8rem;justify-content:center;">
        <button id="btnStartOver" style="padding:0.55rem 1.2rem;background:rgba(255,255,255,0.06);
                border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#888899;
                font-size:0.78rem;cursor:pointer;">
          Desde el inicio
        </button>
        <button id="btnContinue" style="padding:0.55rem 1.4rem;background:#C9A84C;
                border:none;border-radius:8px;color:#000;font-family:'Cinzel',serif;
                font-size:0.78rem;font-weight:700;letter-spacing:0.08em;cursor:pointer;">
          Continuar →
        </button>
      </div>
    </div>
  </div>

  <script src="js/reader.js"></script>
</body>
</html>
