<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Oblivion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <img src="assets/Logo.png?v=3" alt="Oblivion">
      <div class="auth-logo-title">OBLIVION</div>
      <div class="auth-logo-sub">Únete al guild</div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Entrar</div>
      <div class="auth-tab" onclick="switchTab('register')">Registrarse</div>
    </div>

    <!-- LOGIN -->
    <div class="auth-form active" id="formLogin">
      <!-- Discord primero (más fácil para gamers) -->
      <button class="btn-auth btn-discord" onclick="Auth.loginDiscord()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
        </svg>
        Entrar con Discord
      </button>

      <div class="auth-divider">o con email</div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-auth btn-email" onclick="doEmailLogin()">Entrar</button>
      <div class="auth-msg" id="loginMsg"></div>
    </div>

    <!-- REGISTER -->
    <div class="auth-form" id="formRegister">
      <button class="btn-auth btn-discord" onclick="Auth.loginDiscord()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
        </svg>
        Registrarse con Discord
      </button>

      <div class="auth-divider">o con email</div>

      <div class="form-group">
        <label>Nickname (nombre en juego)</label>
        <input type="text" id="regNick" placeholder="Tu nombre en Oblivion">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="regPass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <button class="btn-auth btn-email" onclick="doEmailRegister()">Crear cuenta</button>
      <div class="auth-msg" id="registerMsg"></div>

      <p style="font-size:0.72rem;color:var(--gray);text-align:center;margin-top:1rem;">
        Tu cuenta quedará pendiente de aprobación por un officer de Oblivion.
      </p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
  // ── Detectar si venimos de un callback OAuth (Discord) ──
  const urlParams  = new URLSearchParams(window.location.search);
  const urlHash    = window.location.hash;
  const isCallback = urlParams.has('code') || urlHash.includes('access_token');

  // Debug — ver en consola del browser (F12)
  console.log('[Login] URL:', window.location.href);
  console.log('[Login] isCallback:', isCallback, '| code:', urlParams.get('code'));

  if (isCallback) {
    // Mostrar loading mientras Supabase procesa el token
    document.querySelector('.auth-box').innerHTML = `
      <div style="text-align:center;padding:3rem 1rem;">
        <img src="assets/Logo.png?v=3" style="width:80px;height:80px;object-fit:contain;
             filter:drop-shadow(0 0 20px rgba(0,153,238,0.6));margin-bottom:1.5rem;display:block;margin:0 auto 1.5rem;">
        <div style="font-family:'Cinzel',serif;color:#C9A84C;font-size:1rem;letter-spacing:0.2em;margin-bottom:0.5rem;">OBLIVION</div>
        <div style="color:#666680;font-size:0.85rem;">Verificando tu cuenta...</div>
        <div style="margin-top:1.5rem;display:flex;justify-content:center;gap:0.4rem;">
          <span style="width:8px;height:8px;background:#C9A84C;border-radius:50%;animation:dot 1.2s 0s infinite;display:inline-block;"></span>
          <span style="width:8px;height:8px;background:#C9A84C;border-radius:50%;animation:dot 1.2s 0.2s infinite;display:inline-block;"></span>
          <span style="width:8px;height:8px;background:#C9A84C;border-radius:50%;animation:dot 1.2s 0.4s infinite;display:inline-block;"></span>
        </div>
        <style>@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}</style>
      </div>`;
  }

  // ── Auth state handler ──
  Auth.init((session, profile) => {
    if (session) {
      // Logueado → ir al perfil
      setTimeout(() => { window.location.href = 'profile.html'; }, 300);
    } else if (isCallback) {
      // Volvimos del callback pero no hay sesión → error
      document.querySelector('.auth-box').innerHTML = `
        <div style="text-align:center;padding:2rem;">
          <img src="assets/Logo.png?v=3" style="width:70px;height:70px;object-fit:contain;margin:0 auto 1rem;display:block;">
          <div style="font-family:'Cinzel',serif;color:#C9A84C;margin-bottom:0.8rem;">OBLIVION</div>
          <div style="color:#ff8888;font-size:0.85rem;margin-bottom:1.5rem;">
            Error al conectar con Discord.<br>Asegúrate de que el schema SQL esté ejecutado en Supabase.
          </div>
          <a href="login.html" style="padding:0.6rem 1.5rem;background:#C9A84C;color:#000;border-radius:8px;
             font-family:'Cinzel',serif;font-size:0.78rem;font-weight:700;text-decoration:none;">
            Volver al login
          </a>
        </div>`;
    }
  });

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?0:1)===i));
    document.getElementById('formLogin').classList.toggle('active', tab==='login');
    document.getElementById('formRegister').classList.toggle('active', tab==='register');
  }

  function showMsg(id, msg, type='error') {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = `auth-msg show ${type}`;
  }

  async function doEmailLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) return showMsg('loginMsg', 'Completa todos los campos');
    const { error } = await Auth.loginEmail(email, pass);
    if (error) return showMsg('loginMsg', error.message === 'Invalid login credentials' ? 'Email o contraseña incorrectos' : error.message);
    window.location.href = 'profile.html';
  }

  async function doEmailRegister() {
    const nick  = document.getElementById('regNick').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!nick || !email || !pass) return showMsg('registerMsg', 'Completa todos los campos');
    if (pass.length < 6) return showMsg('registerMsg', 'La contraseña debe tener al menos 6 caracteres');
    const { error } = await Auth.registerEmail(email, pass, nick);
    if (error) return showMsg('registerMsg', error.message);
    showMsg('registerMsg', '✓ Cuenta creada. Revisa tu email para confirmar y espera aprobación de un officer.', 'success');
  }

  // Enter key en login
  ['loginEmail','loginPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doEmailLogin(); });
  });
</script>
</body>
</html>
